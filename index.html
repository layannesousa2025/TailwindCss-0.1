<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram-Tailwind Css</title>
  <link rel="stylesheet" href="./src/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body class="bg-insta-bg font-roboto text-gray-900">

  <main class="flex flex-col min-h-screen items-center py-8 px-4">

    <!-- Seção Principal Side-by-Side -->
    <div class="flex items-center justify-center gap-8 mt-12 max-w-5xl w-full">

      <!-- Imagem do Celular (Apenas em telas Grandes) -->
      <div class="hidden lg:block relative lg:mr-8 transition-all hover:scale-[1.01]">
        <img class="w-[380px]" src="./src/img/celular.png" alt="Smartphone frame">
        <!-- Overlay de imagens que mudam -->
        <div class="absolute top-[26px] right-[18px]">
          <img class="w-[250px] rounded-sm" src="./src/img/insta1.png" alt="Instagram preview screenshot">
        </div>
      </div>

      <!-- Lado do Formulário -->
      <div class="flex flex-col gap-3 w-full max-w-[348px]">

        <!-- Bloco de Login -->
        <div class="bg-white border border-gray-300 p-8 pt-10 flex flex-col items-center">
          <img class="w-44 mb-10" src="./src/img/insta-logo.png" alt="Instagram Logo">

          <form class="flex flex-col w-full gap-2">
            <input type="text" placeholder="Telefone, nome de usuário ou email" required
              class="bg-gray-50 border border-gray-300 text-xs p-2.5 rounded-sm focus:outline-none focus:border-gray-400 placeholder:text-gray-500 transition-all">

            <input type="password" placeholder="Senha" required
              class="bg-gray-50 border border-gray-300 text-xs p-2.5 rounded-sm focus:outline-none focus:border-gray-400 placeholder:text-gray-500 transition-all">

            <button type="submit"
              class="bg-insta-blue text-sm font-semibold text-white py-1.5 rounded-lg mt-2 hover:opacity-90 transition-opacity active:scale-[0.98]">
              Entrar
            </button>

            <!-- Divisor 'OU' -->
            <div class="flex items-center gap-4 my-5">
              <div class="h-[0.5px] bg-gray-300 flex-1"></div>
              <span class="text-[11px] font-bold text-gray-500">OU</span>
              <div class="h-[0.5px] bg-gray-300 flex-1"></div>
            </div>

            <!-- Login Facebook com Ícone real -->
            <button type="button"
              class="flex items-center justify-center gap-2 text-insta-fb font-semibold text-sm hover:opacity-80 transition-opacity">
              <svg aria-label="Facebook" class="w-4 h-4 fill-current" viewBox="0 0 448 512">
                <path
                  d="M400 32H48A48 48 0 0 0 0 80v352a48 48 0 0 0 48 48h137.25V327.69h-63V256h63v-54.64c0-62.15 37-96.48 93.67-96.48 27.14 0 55.52 4.84 55.52 4.84v61h-31.27c-30.81 0-40.42 19.12-40.42 38.73V256h68.78l-11 71.69h-57.78V480H400a48 48 0 0 0 48-48V80a48 48 0 0 0-48-48z" />
              </svg>
              Entrar com o Facebook
            </button>

            <a href="#" class="text-center text-xs text-insta-link mt-4 hover:underline">Esqueceu a senha?</a>
          </form>
        </div>

        <!-- Bloco de Cadastro -->
        <div class="bg-white border border-gray-300 p-6 flex justify-center">
          <p class="text-[14px]">Não tem uma conta? <a href="#"
              class="text-insta-blue font-semibold hover:underline">Cadastre-se</a></p>
        </div>

        <!-- Seção de App Stores -->
        <div class="flex flex-col items-center gap-4 mt-2">
          <p class="text-[14px]">Obtenha o aplicativo.</p>
          <div class="flex gap-2 h-10">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg"
              alt="App Store" class="h-full cursor-pointer hover:opacity-90 transition-opacity">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg"
              alt="Google Play" class="h-full cursor-pointer hover:opacity-90 transition-opacity">
          </div>
        </div>

      </div>
    </div>

    <!-- Rodapé -->
    <footer class="mt-auto py-12 text-center max-w-5xl w-full">
      <div class="flex flex-wrap justify-center gap-x-4 gap-y-2 mb-4 px-4 text-[12px] text-gray-500">
        <a href="#" class="hover:underline">Meta</a>
        <a href="#" class="hover:underline">Sobre</a>
        <a href="#" class="hover:underline">Blog</a>
        <a href="#" class="hover:underline">Carreiras</a>
        <a href="#" class="hover:underline">Ajuda</a>
        <a href="#" class="hover:underline">API</a>
        <a href="#" class="hover:underline">Privacidade</a>
        <a href="#" class="hover:underline">Termos</a>
        <a href="#" class="hover:underline">Principais Contas</a>
        <a href="#" class="hover:underline">Hashtags</a>
        <a href="#" class="hover:underline">Localizações</a>
        <a href="#" class="hover:underline">Instagram Lite</a>
        <a href="#" class="hover:underline">Threads</a>
        <a href="#" class="hover:underline">Contato</a>
        <a href="#" class="hover:underline">Carregamento de fotos e vídeos</a>
        <a href="#" class="hover:underline">Explorar</a>
        <a href="#" class="hover:underline">Social</a>
      </div>

      <div class="flex justify-center gap-4 text-[12px] text-gray-500">
        <span>Português (Brasil)</span>
        <span>&copy; 2024 Instagram from Meta</span>
      </div>
    </footer>

  </main>

</body>

</html>
